name: Bug Report
description: Something is broken or behaving unexpectedly
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug. Please fill in all sections so we can reproduce and fix it quickly.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Upload a PDF file
        2. Click Analyze
        3. See error ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or error messages
      description: Backend terminal output, browser console errors, or network tab response.
      render: text

  - type: dropdown
    id: area
    attributes:
      label: Which area is affected?
      options:
        - File upload / parsing
        - Scoring / analysis
        - AI insights (Gemini)
        - MongoDB / storage
        - Frontend display / charts
        - CI / deployment
        - Other
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "e.g. Windows 11, macOS 14, Ubuntu 22.04"

  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "e.g. 3.11.4"

  - type: input
    id: node
    attributes:
      label: Node version
      placeholder: "e.g. 20.11.0"
