name: Feature Request
description: Suggest a new feature or improvement
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the problem you're running into, not the solution.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see added or changed?
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Which area does this affect?
      options:
        - File parsing / OCR
        - Scoring engine
        - NLP / entity extraction
        - AI insights
        - Frontend / UI
        - API
        - Database / storage
        - CI / deployment
        - Documentation
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about and why this one is better.
