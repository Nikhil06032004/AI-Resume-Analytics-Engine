name: Deploy

# Triggers only on pushes to main — i.e. after a PR is merged.
# Vercel deploys automatically via GitHub integration (no action needed).
# This workflow handles the Render backend deploy hook + status notification.

on:
  push:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────────────────────
  #  Backend — trigger Render deploy hook
  # ─────────────────────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend → Render
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Render deploy
        # RENDER_DEPLOY_HOOK is set in GitHub repo Settings → Secrets and variables → Actions.
        # Get the hook URL from: Render dashboard → your service → Settings → Deploy Hook
        run: |
          if [ -z "${{ secrets.RENDER_DEPLOY_HOOK }}" ]; then
            echo "⚠️  RENDER_DEPLOY_HOOK secret not set — skipping Render deploy trigger."
            echo "Add it in: GitHub repo → Settings → Secrets → Actions → New secret"
          else
            echo "🚀 Triggering Render deployment..."
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}")
            if [ "$STATUS" -eq 200 ] || [ "$STATUS" -eq 201 ]; then
              echo "✅ Render deploy triggered successfully (HTTP $STATUS)"
            else
              echo "❌ Render deploy hook returned HTTP $STATUS"
              exit 1
            fi
          fi

  # ─────────────────────────────────────────────────────────────
  #  Frontend — Vercel deploys automatically; this job just logs it
  # ─────────────────────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend → Vercel
    runs-on: ubuntu-latest
    needs: deploy-backend

    steps:
      - name: Confirm Vercel auto-deployment
        run: |
          echo "✅ Vercel auto-deploys on push to main via GitHub integration."
          echo "   No manual trigger required."
          echo "   Monitor at: https://vercel.com/dashboard"

  # ─────────────────────────────────────────────────────────────
  #  Summary
  # ─────────────────────────────────────────────────────────────
  summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]
    if: always()

    steps:
      - name: Print deployment summary
        run: |
          echo "════════════════════════════════════"
          echo "  Deployment Summary"
          echo "════════════════════════════════════"
          echo "  Backend  → Render (Docker)"
          echo "  Frontend → Vercel (Vite)"
          echo "  Database → MongoDB Atlas"
          echo "════════════════════════════════════"
          echo "  Backend job  : ${{ needs.deploy-backend.result }}"
          echo "  Frontend job : ${{ needs.deploy-frontend.result }}"
          echo "════════════════════════════════════"
