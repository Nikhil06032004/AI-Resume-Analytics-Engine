name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────────────────────────
  #  Frontend — lint + type-check + production build
  # ─────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        # tsconfig.json is a project-references wrapper with "files": [].
        # Running plain `tsc --noEmit` against it checks nothing or errors.
        # Target tsconfig.app.json directly to check all src/ files.
        run: npx tsc -p tsconfig.app.json --noEmit

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: https://api.example.com

      - name: Upload build artefact
        uses: actions/upload-artifact@v4
        if: github.ref == 'refs/heads/main'
        with:
          name: frontend-dist
          path: dist/
          retention-days: 1

  # ─────────────────────────────────────────────────────────────────
  #  Backend — lint + tests
  # ─────────────────────────────────────────────────────────────────
  backend:
    name: Backend CI
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install ruff (linter)
        run: pip install ruff

      - name: Lint with ruff
        run: ruff check app/ --output-format=github

      - name: Download spaCy model
        # No --no-deps: let pip resolve the model's own sub-dependencies
        # so the import works correctly in the test suite.
        run: python -m spacy download en_core_web_sm

      - name: Verify spaCy model loads
        run: python -c "import spacy; spacy.load('en_core_web_sm'); print('spaCy OK')"

      - name: Run tests
        run: pytest tests/ -v --tb=short
        env:
          MONGODB_URI: ""
          AI_API_KEY: ""

  # ─────────────────────────────────────────────────────────────────
  #  Docker build check — only on PRs to save minutes
  # ─────────────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: resume-insights-api:pr-${{ github.event.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
